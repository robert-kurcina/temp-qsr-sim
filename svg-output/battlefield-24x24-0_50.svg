<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="960" height="960" font-family="Arial" font-size="0.6">
<defs>
  <style><![CDATA[
    .layer { display: inline; }
    .layer.hidden { display: none; }
    .grid-line { stroke: #999; stroke-width: 0.02; opacity: 0.2; }
    .delaunay-line { stroke: #4a6fa5; stroke-width: 0.03; opacity: 0.3; }
    .terrain-area { stroke: #000; stroke-width: 0.05; }
    .terrain-solid { stroke: #000; stroke-width: 0.05; }
    .model { stroke: #000; stroke-width: 0.05; }
    .path { fill: none; stroke-width: 0.12; }
    .vector { stroke-width: 0.1; }
    .los-ray { stroke-width: 0.08; stroke-dasharray: 0.2 0.2; }
    .lof-ray { stroke-width: 0.08; stroke-dasharray: 0.3 0.15; }
    .label { fill: #111; font-size: 0.6px; }
    .toggle { cursor: pointer; }
  ]]></style>
</defs>
<rect x="0" y="0" width="24" height="24" fill="#ffffff" stroke="#111" stroke-width="0.05"/>
<g id="legend">
<g class="toggle" onclick="toggleLayer('grid')"><rect x="0.4" y="0.14999999999999997" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="0.5499999999999999" class="label">0.5 MU Grid</text></g>
<g class="toggle" onclick="toggleLayer('delaunay')"><rect x="0.4" y="0.95" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="1.3499999999999999" class="label">Delaunay Mesh</text></g>
<g class="toggle" onclick="toggleLayer('area')"><rect x="0.4" y="1.7500000000000002" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="2.1500000000000004" class="label">Area Terrain</text></g>
<g class="toggle" onclick="toggleLayer('terrain')"><rect x="0.4" y="2.55" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="2.95" class="label">Other Terrain</text></g>
<g class="toggle" onclick="toggleLayer('models')"><rect x="0.4" y="3.3499999999999996" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="3.75" class="label">Models</text></g>
<g class="toggle" onclick="toggleLayer('paths')"><rect x="0.4" y="4.1499999999999995" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="4.55" class="label">Paths</text></g>
<g class="toggle" onclick="toggleLayer('vectors')"><rect x="0.4" y="4.949999999999999" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="5.35" class="label">Vectors</text></g>
<g class="toggle" onclick="toggleLayer('los')"><rect x="0.4" y="5.749999999999999" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="6.1499999999999995" class="label">LOS</text></g>
<g class="toggle" onclick="toggleLayer('lof')"><rect x="0.4" y="6.549999999999999" width="0.4" height="0.4" fill="#222" stroke="#222" stroke-width="0.05"/><text x="1.0" y="6.949999999999999" class="label">LOF</text></g>
</g>
<script><![CDATA[
      function toggleLayer(id) {
        var layer = document.getElementById('layer-' + id);
        if (!layer) return;
        if (layer.classList.contains('hidden')) {
          layer.classList.remove('hidden');
        } else {
          layer.classList.add('hidden');
        }
      }
    ]]></script>
<text x="0.4" y="23.6" class="label">Battlefield 24x24 density 0 blockLOS 50</text>
