<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MEST Battlefield SVG Gallery</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 16px;
        color: #111;
      }
      .controls {
        display: flex;
        gap: 12px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      select {
        font-size: 14px;
        padding: 4px 8px;
      }
      iframe {
        width: 100%;
        height: 900px;
        border: 1px solid #222;
      }
      .note {
        font-size: 12px;
        color: #444;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <h1>MEST Battlefield SVG Gallery</h1>
    <div class="controls">
      <label for="svgSelect">Select render:</label>
      <select id="svgSelect"></select>
    </div>
    <iframe id="svgFrame" title="SVG Render"></iframe>
    <div class="note">
      Layer toggles are embedded inside each SVG (click the checkbox labels in the SVG).
    </div>

    <script>
      const svgFiles = [
        "battlefield-24x24-0_0.svg",
        "battlefield-24x24-0_25.svg",
        "battlefield-24x24-0_50.svg",
        "battlefield-24x24-0_75.svg",
        "battlefield-24x24-0_100.svg",
        "battlefield-24x24-25_0.svg",
        "battlefield-24x24-25_25.svg",
        "battlefield-24x24-25_50.svg",
        "battlefield-24x24-25_75.svg",
        "battlefield-24x24-25_100.svg",
        "battlefield-24x24-50_0.svg",
        "battlefield-24x24-50_25.svg",
        "battlefield-24x24-50_50.svg",
        "battlefield-24x24-50_75.svg",
        "battlefield-24x24-50_100.svg",
        "battlefield-24x24-75_0.svg",
        "battlefield-24x24-75_25.svg",
        "battlefield-24x24-75_50.svg",
        "battlefield-24x24-75_75.svg",
        "battlefield-24x24-75_100.svg",
        "battlefield-24x24-100_0.svg",
        "battlefield-24x24-100_25.svg",
        "battlefield-24x24-100_50.svg",
        "battlefield-24x24-100_75.svg",
        "battlefield-24x24-100_100.svg",
        "battlefield-24x24-pathfinding-1.svg",
        "battlefield-24x24-pathfinding-2.svg",
        "battlefield-24x24-pathfinding-3.svg",
        "battlefield-24x24-los-1.svg",
        "battlefield-24x24-los-2.svg",
        "battlefield-24x24-los-3.svg",
        "battlefield-24x24-lof-1.svg",
        "battlefield-24x24-lof-2.svg",
        "battlefield-24x24-lof-3.svg"
      ];

      const select = document.getElementById("svgSelect");
      const frame = document.getElementById("svgFrame");

      svgFiles.forEach(file => {
        const option = document.createElement("option");
        option.value = file;
        option.textContent = file;
        select.appendChild(option);
      });

      function loadSvg(file) {
        frame.src = file;
      }

      select.addEventListener("change", () => loadSvg(select.value));

      select.value = svgFiles[0];
      loadSvg(svgFiles[0]);
    </script>
  </body>
</html>
